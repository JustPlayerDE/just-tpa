name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "[0-9]*"

concurrency: release

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: true
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(date -u +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT
          fi
      - name: Find previous release tag
        id: prev
        run: |
          PREV=$(git tag -l --sort=-creatordate | grep "^[0-9]" | grep -v "^${{ steps.tag.outputs.tag }}$" | head -1)
          echo "tag=${PREV}" >> $GITHUB_OUTPUT
      - name: Set up JDK 18
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: 18
          cache: 'maven'
      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots package "-Drevision=${{ steps.tag.outputs.tag }}"
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          target_commitish: ${{ github.sha }}
          previous_tag: ${{ steps.prev.outputs.tag }}
          make_latest: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            target/just-tpa-${{ steps.tag.outputs.tag }}.jar