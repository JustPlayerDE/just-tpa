name: dev-build

on:
  push:
    branches:
      - master

concurrency: devbuild

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: true
      - name: Find previous dev tag
        id: prev
        run: |
          PREV=$(git tag -l --sort=-creatordate | grep "^dev-" | head -1)
          echo "tag=${PREV}" >> $GITHUB_OUTPUT
      - name: Set up JDK 18
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: 18
          cache: 'maven'
      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots package "-Drevision=git-${{ github.ref_name }}-${GITHUB_SHA::6}"
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: dev-${{ github.run_number }}
          name: "Development Build ${{ github.run_number }}"
          previous_tag: ${{ steps.prev.outputs.tag }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            target/just-tpa-*.jar